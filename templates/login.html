{% extends "base.html" %}

{% block title %}Login - FinTrackr{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h1 class="text-center">Sign In to Your Account</h1>
    
    <form method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input 
                type="text" 
                id="username" 
                name="username" 
                placeholder="Enter your username" 
                required
            >
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="Enter your password" 
                required
            >
        </div>
        
        <div class="form-group">
            <input type="submit" value="Login">
        </div>
    </form>
    
    <p class="text-center" style="margin-top: 1rem; color: #666;">
        Don't have an account? <a href="{{ url_for('register') }}" style="color: #667eea; font-weight: 600;">Register here</a>
    </p>
</div>
{% endblock %}
